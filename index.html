<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo | Gestão Financeira</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h1 class="logo">FLUXO</h1>

        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="historico.html">Histórico</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="container">

        <!-- INTRO -->
        <section class="intro">
            <h2>Bem-vindo ao seu Gerenciador Financeiro</h2>
            <p>Use o menu acima para navegar entre controle financeiro e histórico.</p>
        </section>

        <!-- DASHBOARD -->
        <section class="dashboard">
            <h3>Dashboard</h3>

            <div class="field">
                <label for="mes">Mês</label>
                <select id="mes">
                    <option>Janeiro</option>
                    <option>Fevereiro</option>
                    <option>Março</option>
                    <option>Abril</option>
                    <option>Maio</option>
                    <option>Junho</option>
                    <option>Julho</option>
                    <option>Agosto</option>
                    <option>Setembro</option>
                    <option>Outubro</option>
                    <option>Novembro</option>
                    <option>Dezembro</option>
                </select>
            </div>

            <div class="field">
                <label for="saldo">Renda do mês</label>
                <input id="saldo" class="input" type="number" placeholder="Seus ganhos">
            </div>

            <div class="field">
                <label for="gastoTotal">Gastos do mês</label>
                <input id="gastoTotal" class="input" type="number" disabled>
            </div>

            <div class="field">
                <label for="saldoFinal">Saldo final</label>
                <input id="saldoFinal" class="input" type="number" disabled>
            </div>
        </section>

        <!-- GASTOS -->
        <section class="gastos">
            <h3>Adicionar Gasto</h3>

            <div class="gasto-form">
                <input id="descricao" class="input" type="text" placeholder="Descrição do gasto">
                <input id="valor" class="input" type="number" placeholder="Valor" step="0.01">
                <button id="addGasto" class="btn primary">Adicionar</button>
            </div>

            <ul id="gastoList" class="lista"></ul>
        </section>

        <!-- FECHAR MÊS -->
        <section class="fechar">
            <button id="fecharMes" class="btn danger">Fechar mês</button>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
